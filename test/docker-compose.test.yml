services:
  nginx:
    image: nginx:alpine
    container_name: stratos-nginx
    restart: 'no'
    ports:
      - '8443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      stratos:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://127.0.0.1/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 5s

  ssl-init:
    image: alpine:latest
    container_name: stratos-ssl-init
    volumes:
      - ssl-certs:/ssl
    command:
      - sh
      - -c
      - |
        if [ ! -f /ssl/cert.pem ]; then
          apk add --no-cache openssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /ssl/key.pem -out /ssl/cert.pem \
            -subj '/CN=localhost/O=Stratos/C=US' \
            -addext 'basicConstraints=CA:FALSE' \
            -addext 'keyUsage=digitalSignature,keyEncipherment' \
            -addext 'extendedKeyUsage=serverAuth' \
            -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1'
          chmod 644 /ssl/*.pem
        fi

  stratos:
    networks:
      - default
    user: 1000:1000
    build:
      context: ..
      dockerfile: ./Dockerfile
    container_name: stratos-test
    restart: 'no'
    ports:
      - '3100:3100'
    env_file:
      - .env
    environment:
      STRATOS_PORT: 3100
      STRATOS_DATA_DIR: /app/data
      STRATOS_BLOB_STORAGE: local
      STRATOS_PUBLIC_URL: ${STRATOS_PUBLIC_URL:-http://127.0.0.1:3100}
      STRATOS_SERVICE_DID: ${STRATOS_SERVICE_DID:-did:web:127.0.0.1%3A3100}
      STRATOS_OAUTH_ISSUER: ${STRATOS_OAUTH_ISSUER}
      STRATOS_OAUTH_CLIENT_ID: ${STRATOS_OAUTH_CLIENT_ID:-http://127.0.0.1:3100/client-metadata.json}
      STRATOS_OAUTH_CLIENT_URI: ${STRATOS_OAUTH_CLIENT_URI:-http://127.0.0.1:3100}
      STRATOS_OAUTH_REDIRECT_URI: ${STRATOS_OAUTH_REDIRECT_URI:-http://127.0.0.1:3100/oauth/callback}
    depends_on:
      ssl-init:
        condition: service_completed_successfully
    volumes:
      - ./test-data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3100/health',
        ]
      interval: 2s
      timeout: 5s
      retries: 30

  ngrok:
    networks:
      - default
    image: ngrok/ngrok:latest
    container_name: stratos-ngrok
    restart: 'no'
    ports:
      - '4040:4040'
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - http
      - http://stratos:3100

networks:
  default:
    name: stratos-test-net

volumes:
  ssl-certs:
