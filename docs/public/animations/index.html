<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stratos – Presentation Animations</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100vh;background:#070c1c;
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center
}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:20px;padding:40px;max-width:900px;width:100%
}
a.card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:#0e1729;border:1.5px solid #1d2e52;border-radius:14px;
  padding:28px 20px;text-decoration:none;
  transition:border-color .3s,box-shadow .3s
}
a.card:hover{border-color:#4a9fff;box-shadow:0 0 22px rgba(74,159,255,.25)}
.card-icon{font-size:36px;line-height:1}
.card-title{font-size:13px;font-weight:700;color:#b9cbf4;text-align:center}
.card-desc{font-size:11px;color:#4b5f94;text-align:center;line-height:1.5}
.header{
  position:absolute;top:28px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#4b5f94
}
</style>
</head>
<body>
<div class="header">Stratos Animations</div>
<div class="grid">
  <a class="card" href="enrollment-flow.html">
    <div class="card-icon">🔐</div>
    <div class="card-title">Enrollment Flow</div>
    <div class="card-desc">OAuth enrollment, signing key generation, attestation, PDS publish</div>
  </a>
  <a class="card" href="boundary-access.html">
    <div class="card-icon">⊓</div>
    <div class="card-title">Boundary Access</div>
    <div class="card-desc">How viewer boundaries are checked against record boundaries</div>
  </a>
  <a class="card" href="appview-hydration.html">
    <div class="card-icon">💧</div>
    <div class="card-title">AppView Hydration</div>
    <div class="card-desc">Stub discovery, auth, boundary check, and full record return</div>
  </a>
</div>
</body>
</html>
