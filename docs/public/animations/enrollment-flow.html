<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enrollment Flow – Stratos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1F0B35;--card:#240D45;--bdr:#7780DC;
  --txt:#cdc6ff;--dim:#8878b0;
  --blu:#9145EC;--grn:#24cf6e;--pur:#9145EC
}
html,body{
  width:100%;height:100%;background:var(--bg);
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden
}
.stage{position:relative;width:900px;height:520px;transform-origin:center}
.node{
  position:absolute;background:var(--card);border:1.5px solid var(--bdr);
  border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:12px 14px;
  transition:border-color .4s,box-shadow .4s,opacity .4s,transform .4s
}
.ni{font-size:32px;line-height:1}
.nn{font-size:15px;font-weight:700;color:var(--txt);text-align:center;white-space:nowrap}
.ns{font-size:13px;color:var(--dim);text-align:center;white-space:nowrap}
.badge{
  font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;
  white-space:nowrap;margin-top:2px;
  background:rgba(145,69,236,.15);color:var(--pur);border:1px solid rgba(145,69,236,.3)
}
.att-divider{width:100%;border:none;border-top:1px solid rgba(119,128,220,0.3);margin:2px 0}
.att-fields{width:100%}
.att-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;gap:8px}
.att-key{color:var(--dim);font-weight:600;flex-shrink:0}
.att-val{color:var(--txt);text-align:right}
.att-ok{color:var(--grn)}
@keyframes breathe{
  0%,100%{box-shadow:0 0 22px rgba(145,69,236,.35)}
  50%{box-shadow:0 0 42px rgba(145,69,236,.7)}
}
.hl{border-color:var(--blu)!important;animation:breathe 2s ease-in-out infinite}
.ok{border-color:var(--grn)!important;box-shadow:0 0 24px rgba(36,207,110,.4)!important}
.gone{opacity:0;transform:scale(.88) translateY(6px);pointer-events:none}
.arsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
@keyframes march{to{stroke-dashoffset:-12}}
.ar{
  fill:none;stroke-width:2;stroke-linecap:butt;
  stroke-dasharray:8 4;
  opacity:0;transition:opacity .4s
}
.ar.show{opacity:1;animation:march .5s linear infinite}
.stage::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:700px;height:420px;
  background:radial-gradient(ellipse,rgba(80,20,130,.25) 0%,transparent 70%);
  pointer-events:none
}
</style>
</head>
<body>
<div class="stage" id="stage">

  <svg class="arsvg" viewBox="0 0 900 520">
    <defs>
      <marker id="ml" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#9145EC"/>
      </marker>
      <marker id="mg" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#24cf6e"/>
      </marker>
    </defs>
    <path id="a1" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 190 224 L 326 214"/>
    <path id="a2" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 426 270 L 322 352"/>
    <path id="a3" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 398 404 L 428 404"/>
    <path id="a4" class="ar" stroke="#24cf6e" marker-end="url(#mg)" d="M 526 214 L 716 224"/>
  </svg>

  <div class="node" id="nu" style="left:40px;top:178px;width:155px">
    <div class="ni">🧑</div>
    <div class="nn">User</div>
    <div class="ns">alice.bsky.social</div>
  </div>

  <div class="node" id="nst" style="left:326px;top:168px;width:200px">
    <div class="ni">⚙️</div>
    <div class="nn">Stratos Service</div>
    <div class="ns">stratos.example.com</div>
  </div>

  <div class="node" id="npds" style="left:716px;top:178px;width:162px">
    <div class="ni">🗄️</div>
    <div class="nn">PDS</div>
    <div class="ns">pds.bsky.social</div>
  </div>

  <div class="node gone" id="nkey" style="left:246px;top:352px;width:155px">
    <div class="ni">🔑</div>
    <div class="nn">Signing Key</div>
    <div class="badge">secp256k1</div>
  </div>

  <div class="node gone" id="natt" style="left:428px;top:348px;width:204px">
    <div class="ni">✍️</div>
    <div class="nn">Attestation</div>
    <hr class="att-divider">
    <div class="att-fields">
      <div class="att-row"><span class="att-key">did</span><span class="att-val">alice.bsky.social</span></div>
      <div class="att-row"><span class="att-key">key</span><span class="att-val">secp256k1</span></div>
      <div class="att-row"><span class="att-key">sig</span><span class="att-val att-ok">✓ by service</span></div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const add = (el, ...c) => el.classList.add(...c);
const rm  = (el, ...c) => el.classList.remove(...c);

function reset() {
  ['nu','nst','npds','nkey','natt'].forEach(id => rm($(id),'hl','ok'));
  add($('nkey'),'gone'); add($('natt'),'gone');
  ['a1','a2','a3','a4'].forEach(id => rm($(id),'show'));
}

const steps = [
  { dur: 1800, fn() { add($('nu'),'hl'); } },
  { dur: 1900, fn() { rm($('nu'),'hl'); add($('nst'),'hl'); add($('a1'),'show'); } },
  { dur: 1900, fn() { rm($('nkey'),'gone'); add($('nkey'),'hl'); add($('a2'),'show'); } },
  { dur: 1900, fn() { rm($('nkey'),'hl'); rm($('natt'),'gone'); add($('natt'),'hl'); add($('a3'),'show'); } },
  { dur: 2200, fn() { rm($('natt'),'hl'); rm($('nst'),'hl'); add($('npds'),'ok'); add($('a4'),'show'); } },
];

function run(i) {
  steps[i].fn();
  setTimeout(() => {
    const next = (i + 1) % steps.length;
    if (next === 0) { reset(); setTimeout(() => run(0), 800); }
    else run(next);
  }, steps[i].dur);
}

function fit() {
  const s = Math.min(innerWidth / 900, innerHeight / 520);
  $('stage').style.transform = `scale(${s})`;
}
addEventListener('resize', fit); fit();
reset();
setTimeout(() => run(0), 600);
</script>
</body>
</html>
