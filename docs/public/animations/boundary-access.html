<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boundary Access – Stratos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1F0B35;--card:#240D45;--bdr:#7780DC;
  --txt:#cdc6ff;--dim:#8878b0;
  --blu:#9145EC;--grn:#24cf6e;--red:#f54b4b;--ora:#f5a523
}
html,body{
  width:100%;height:100%;background:var(--bg);
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden
}
.stage{position:relative;width:900px;height:520px;transform-origin:center}
.node{
  position:absolute;background:var(--card);border:1.5px solid var(--bdr);
  border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:12px 14px;
  transition:border-color .4s,box-shadow .4s,opacity .4s,transform .4s
}
.ni{font-size:32px;line-height:1}
.nn{font-size:15px;font-weight:700;color:var(--txt);text-align:center;white-space:nowrap}
.ns{font-size:13px;color:var(--dim);text-align:center;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:4px}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;white-space:nowrap;transition:background .4s,color .4s,border-color .4s}
.tb{background:rgba(145,69,236,.15);color:var(--blu);border:1px solid rgba(145,69,236,.35)}
.tg{background:rgba(36,207,110,.18);color:var(--grn);border:1px solid rgba(36,207,110,.35)}
.tr{background:rgba(245,75,75,.15);color:var(--red);border:1px solid rgba(245,75,75,.3)}
.to{background:rgba(245,165,35,.15);color:var(--ora);border:1px solid rgba(245,165,35,.3)}
@keyframes breathe{
  0%,100%{box-shadow:0 0 22px rgba(145,69,236,.35)}
  50%{box-shadow:0 0 42px rgba(145,69,236,.7)}
}
.hl{border-color:var(--blu)!important;animation:breathe 2s ease-in-out infinite}
.ok{border-color:var(--grn)!important;box-shadow:0 0 24px rgba(36,207,110,.4)!important}
.fail{border-color:var(--red)!important;box-shadow:0 0 24px rgba(245,75,75,.4)!important}
.gone{opacity:0;transform:scale(.88) translateY(6px);pointer-events:none}
.arsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
@keyframes march{to{stroke-dashoffset:-12}}
.ar{
  fill:none;stroke-width:2;stroke-linecap:butt;
  stroke-dasharray:8 4;
  opacity:0;transition:opacity .4s
}
.ar.show{opacity:1;animation:march .5s linear infinite}
.result-box{
  position:absolute;left:312px;top:412px;width:276px;height:72px;
  border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;
  border:1.5px solid var(--bdr);background:var(--card);
  transition:opacity .4s,transform .4s,border-color .4s,box-shadow .4s
}
.result-box.gone{opacity:0;transform:scale(.9) translateY(6px);pointer-events:none}
.result-box.ok{background:rgba(36,207,110,.08);border-color:var(--grn);box-shadow:0 0 22px rgba(36,207,110,.3)}
.result-box.fail{background:rgba(245,75,75,.08);border-color:var(--red);box-shadow:0 0 22px rgba(245,75,75,.3)}
.res-icon{font-size:28px}
.res-txt{font-size:17px;font-weight:700;letter-spacing:.07em}
.res-txt.ok{color:var(--grn)}
.res-txt.fail{color:var(--red)}
.stage::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:700px;height:400px;
  background:radial-gradient(ellipse,rgba(80,20,130,.25) 0%,transparent 70%);
  pointer-events:none
}
</style>
</head>
<body>
<div class="stage" id="stage">

  <svg class="arsvg" viewBox="0 0 900 520">
    <defs>
      <marker id="ml" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#9145EC"/>
      </marker>
      <marker id="mg" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#24cf6e"/>
      </marker>
      <marker id="mr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#f54b4b"/>
      </marker>
    </defs>
    <path id="avc" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 218 200 L 312 338"/>
    <path id="arc" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 682 200 L 588 338"/>
    <path id="acr" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 450 385 L 450 412"/>
  </svg>

  <!-- Viewer node -->
  <div class="node" id="nv" style="left:38px;top:148px;width:180px">
    <svg width="44" height="44" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" id="smiley-svg">
      <circle cx="19" cy="19" r="16" stroke="#7780DC" stroke-width="2"/>
      <circle cx="13.5" cy="15" r="2" fill="#7780DC"/>
      <circle cx="24.5" cy="15" r="2" fill="#7780DC"/>
      <path d="M 12.5 23 Q 19 29.5 25.5 23" stroke="#7780DC" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="nn">Viewer</div>
    <div class="ns">bob.bsky.social</div>
    <div class="tags">
      <span class="tag tb" id="vt1">cooking</span>
    </div>
  </div>

  <!-- Record node -->
  <div class="node" id="nr" style="left:682px;top:148px;width:190px">
    <div class="ni">📄</div>
    <div class="nn">Record</div>
    <div class="ns">zone.stratos.feed.post</div>
    <div class="tags">
      <span class="tag tb" id="rt1">cooking</span>
      <span class="tag tb" id="rt2">hiking</span>
    </div>
  </div>

  <!-- Boundary Check node -->
  <div class="node gone" id="nchk" style="left:312px;top:295px;width:276px;min-height:90px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:20px;color:var(--dim)">⊓</span>
      <span class="nn" id="chk-label">Boundary Intersection</span>
    </div>
    <div class="tags" id="chk-tags"></div>
  </div>

  <!-- Result box -->
  <div class="result-box gone" id="res-box">
    <div class="res-icon" id="res-icon">✓</div>
    <div class="res-txt" id="res-txt">ACCESS GRANTED</div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const add = (el, ...c) => el.classList.add(...c);
const rm  = (el, ...c) => el.classList.remove(...c);

const SMILEY_DIM    = '#7780DC';
const SMILEY_ACTIVE = '#9145EC';

function smileyColor(color) {
  document.querySelectorAll('#smiley-svg circle, #smiley-svg path').forEach(el => {
    el.setAttribute('stroke', color);
    if (el.tagName === 'circle' && el.getAttribute('fill') !== 'none') el.setAttribute('fill', color);
  });
}

function setArrow(id, color, markerId) {
  const e = $(id);
  e.setAttribute('stroke', color);
  e.setAttribute('marker-end', `url(#${markerId})`);
}

function resetToPhaseA() {
  ['nv','nr','nchk'].forEach(id => rm($(id),'hl','ok','fail'));
  add($('nchk'),'gone');
  const rb = $('res-box');
  add(rb,'gone'); rm(rb,'ok','fail');

  ['avc','arc','acr'].forEach(id => rm($(id),'show'));
  setArrow('avc','#9145EC','ml');
  setArrow('arc','#9145EC','ml');
  setArrow('acr','#9145EC','ml');

  $('vt1').textContent = 'cooking';
  $('vt1').className = 'tag tb';
  smileyColor(SMILEY_DIM);

  $('rt1').className = 'tag tb';
  $('rt2').className = 'tag tb';

  $('chk-label').textContent = 'Boundary Intersection';
  $('chk-tags').innerHTML = '';
}

const steps = [
  // Phase A: Access Granted
  { dur: 1800, fn() { add($('nr'),'hl'); } },
  { dur: 1800, fn() { rm($('nr'),'hl'); add($('nv'),'hl'); smileyColor(SMILEY_ACTIVE); } },
  {
    dur: 1900,
    fn() {
      rm($('nv'),'hl'); smileyColor(SMILEY_DIM);
      rm($('nchk'),'gone'); add($('nchk'),'hl');
      add($('avc'),'show'); add($('arc'),'show');
    }
  },
  {
    dur: 2000,
    fn() {
      $('vt1').className = 'tag tg';
      $('rt1').className = 'tag tg';
      $('chk-tags').innerHTML = '<span class="tag tg">cooking</span>';
    }
  },
  {
    dur: 2200,
    fn() {
      rm($('nchk'),'hl'); add($('nchk'),'ok');
      add($('acr'),'show');
      const rb = $('res-box');
      rm(rb,'gone'); add(rb,'ok');
      $('res-icon').textContent = '✓';
      $('res-txt').textContent = 'ACCESS GRANTED';
      $('res-txt').className = 'res-txt ok';
    }
  },
  // Transition
  { dur: 700, fn() { resetToPhaseA(); } },
  // Phase B: Access Denied
  {
    dur: 1800,
    fn() {
      add($('nv'),'hl'); smileyColor(SMILEY_ACTIVE);
      $('vt1').textContent = 'gaming';
      $('vt1').className = 'tag to';
    }
  },
  {
    dur: 1900,
    fn() {
      rm($('nv'),'hl'); smileyColor(SMILEY_DIM);
      rm($('nchk'),'gone'); add($('nchk'),'hl');
      setArrow('avc','#f54b4b','mr');
      setArrow('arc','#f54b4b','mr');
      setArrow('acr','#f54b4b','mr');
      add($('avc'),'show'); add($('arc'),'show');
    }
  },
  {
    dur: 2200,
    fn() {
      rm($('nchk'),'hl'); add($('nchk'),'fail');
      $('chk-label').textContent = 'No shared boundaries';
      add($('acr'),'show');
      const rb = $('res-box');
      rm(rb,'gone'); add(rb,'fail');
      $('res-icon').textContent = '✗';
      $('res-txt').textContent = 'ACCESS DENIED';
      $('res-txt').className = 'res-txt fail';
    }
  },
];

function run(i) {
  steps[i].fn();
  setTimeout(() => {
    const next = (i + 1) % steps.length;
    if (next === 0) { resetToPhaseA(); setTimeout(() => run(0), 800); }
    else run(next);
  }, steps[i].dur);
}

function fit() {
  const s = Math.min(innerWidth / 900, innerHeight / 520);
  $('stage').style.transform = `scale(${s})`;
}
addEventListener('resize', fit); fit();
resetToPhaseA();
setTimeout(() => run(0), 600);
</script>
</body>
</html>
