<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AppView Hydration – Stratos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1F0B35;--card:#240D45;--bdr:#7780DC;
  --txt:#cdc6ff;--dim:#8878b0;
  --blu:#9145EC;--grn:#24cf6e;--pur:#9145EC
}
html,body{
  width:100%;height:100%;background:var(--bg);
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden
}
.stage{position:relative;width:900px;height:520px;transform-origin:top center}
.node{
  position:absolute;background:var(--card);border:1.5px solid var(--bdr);
  border-radius:12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:12px 14px;
  transition:border-color .4s,box-shadow .4s,opacity .4s,transform .4s
}
.ni{font-size:32px;line-height:1}
.nn{font-size:15px;font-weight:700;color:var(--txt);text-align:center;white-space:nowrap}
.ns{font-size:13px;color:var(--dim);text-align:center;white-space:nowrap}
.tag{
  font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;
  white-space:nowrap;margin-top:3px
}
.tb{background:rgba(145,69,236,.15);color:var(--blu);border:1px solid rgba(145,69,236,.35)}
.tg{background:rgba(36,207,110,.15);color:var(--grn);border:1px solid rgba(36,207,110,.3)}
.tp{background:rgba(145,69,236,.15);color:var(--pur);border:1px solid rgba(145,69,236,.3)}
@keyframes breathe{
  0%,100%{box-shadow:0 0 22px rgba(145,69,236,.35)}
  50%{box-shadow:0 0 42px rgba(145,69,236,.7)}
}
.hl{border-color:var(--blu)!important;animation:breathe 2s ease-in-out infinite}
.ok{border-color:var(--grn)!important;box-shadow:0 0 24px rgba(36,207,110,.4)!important}
.gone{opacity:0;transform:scale(.88) translateY(6px);pointer-events:none}
.arsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
@keyframes march{to{stroke-dashoffset:-12}}
.ar{
  fill:none;stroke-width:2;stroke-linecap:butt;
  stroke-dasharray:8 4;
  opacity:0;transition:opacity .4s
}
.ar.show{opacity:1;animation:march .5s linear infinite}
.pill{
  position:absolute;background:var(--card);border:1px solid var(--bdr);
  border-radius:8px;padding:7px 12px;font-size:11px;line-height:1.6;
  opacity:0;transform:scale(.85);pointer-events:none;
  transition:opacity .4s,transform .4s
}
.pill.show{opacity:1;transform:scale(1)}
.pill-row{display:flex;align-items:center;gap:6px;white-space:nowrap}
.pill-row .icon{font-size:14px}
.c-blu{color:var(--blu)}
.c-grn{color:var(--grn)}
.c-pur{color:var(--pur)}
.c-dim{color:var(--dim)}
.av-content{
  position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--dim);opacity:0;transition:opacity .4s;white-space:nowrap
}
.av-content.show{opacity:1;color:var(--grn)}
@keyframes process{
  0%,100%{box-shadow:0 0 22px rgba(145,69,236,.35)}
  50%{box-shadow:0 0 42px rgba(145,69,236,.7)}
}
.processing{border-color:var(--pur)!important;animation:process 1.2s ease-in-out infinite!important}
.stage::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:700px;height:400px;
  background:radial-gradient(ellipse,rgba(80,20,130,.25) 0%,transparent 70%);
  pointer-events:none
}
</style>
</head>
<body>
<div class="stage" id="stage">

  <svg class="arsvg" viewBox="0 0 900 520">
    <defs>
      <marker id="ml" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#9145EC"/>
      </marker>
      <marker id="mg" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#24cf6e"/>
      </marker>
    </defs>
    <path id="a1" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 208 256 L 654 152"/>
    <path id="a2" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 654 164 L 208 264"/>
    <path id="a3" class="ar" stroke="#9145EC" marker-end="url(#ml)" d="M 208 266 L 654 370"/>
    <path id="a4" class="ar" stroke="#24cf6e" marker-end="url(#mg)" d="M 654 382 L 208 272"/>
  </svg>

  <div class="node" id="nav" style="left:38px;top:215px;width:170px">
    <div class="ni">📱</div>
    <div class="nn">AppView</div>
    <div class="ns">appview.example.com</div>
    <div class="av-content" id="av-record">full record ✓</div>
  </div>

  <div class="node" id="npds" style="left:654px;top:100px;width:190px">
    <div class="ni">🗄️</div>
    <div class="nn">PDS</div>
    <div class="ns">pds.bsky.social</div>
    <div class="tag tb">has stub record</div>
  </div>

  <div class="node" id="nst" style="left:654px;top:318px;width:190px">
    <div class="ni">⚙️</div>
    <div class="nn">Stratos Service</div>
    <div class="ns">stratos.example.com</div>
    <div class="tag tp">holds full records</div>
  </div>

  <div class="pill" id="stub-pill" style="left:330px;top:152px">
    <div class="pill-row"><span class="icon">📋</span><span class="c-blu">stub record</span></div>
    <div class="pill-row"><span class="c-dim">→ </span><span class="c-blu">stratos.example.com</span></div>
  </div>

  <div class="pill" id="auth-pill" style="left:210px;top:248px">
    <div class="pill-row"><span class="icon">🔐</span><span class="c-pur">DPoP token</span></div>
    <div class="pill-row"><span class="c-dim">user auth</span></div>
  </div>

  <div class="pill" id="proc-pill" style="left:654px;top:428px;width:188px">
    <div class="pill-row"><span class="icon">🔍</span><span class="c-pur">verifying auth</span></div>
    <div class="pill-row"><span class="icon">⊓</span><span class="c-pur">checking boundaries</span></div>
  </div>

  <div class="pill" id="rec-pill" style="left:340px;top:330px">
    <div class="pill-row"><span class="icon">📦</span><span class="c-grn">hydrated record</span></div>
    <div class="pill-row"><span class="c-dim">full content + metadata</span></div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const add = (el, ...c) => el.classList.add(...c);
const rm  = (el, ...c) => el.classList.remove(...c);

function reset() {
  ['nav','npds','nst'].forEach(id => rm($(id),'hl','ok','processing'));
  ['a1','a2','a3','a4'].forEach(id => rm($(id),'show'));
  ['stub-pill','auth-pill','proc-pill','rec-pill'].forEach(id => rm($(id),'show'));
  rm($('av-record'),'show');
}

const steps = [
  { dur: 1900, fn() { add($('nav'),'hl'); add($('npds'),'hl'); add($('a1'),'show'); } },
  {
    dur: 2200,
    fn() {
      rm($('nav'),'hl'); rm($('npds'),'hl');
      add($('a2'),'show');
      setTimeout(() => add($('stub-pill'),'show'), 250);
    }
  },
  {
    dur: 2000,
    fn() {
      rm($('stub-pill'),'show');
      add($('nav'),'hl'); add($('nst'),'hl');
      add($('auth-pill'),'show');
      setTimeout(() => add($('a3'),'show'), 200);
    }
  },
  {
    dur: 2200,
    fn() {
      rm($('nav'),'hl'); rm($('auth-pill'),'show');
      rm($('nst'),'hl'); add($('nst'),'processing');
      add($('proc-pill'),'show');
    }
  },
  {
    dur: 2200,
    fn() {
      rm($('nst'),'processing'); rm($('proc-pill'),'show');
      add($('a4'),'show');
      setTimeout(() => add($('rec-pill'),'show'), 250);
    }
  },
  {
    dur: 2000,
    fn() {
      rm($('rec-pill'),'show');
      add($('nav'),'ok');
      add($('av-record'),'show');
    }
  },
];

function run(i) {
  steps[i].fn();
  setTimeout(() => {
    const next = (i + 1) % steps.length;
    if (next === 0) { reset(); setTimeout(() => run(0), 800); }
    else run(next);
  }, steps[i].dur);
}

function fit() {
  const s = Math.min(innerWidth / 900, innerHeight / 520);
  $('stage').style.transform = `scale(${s})`;
}
addEventListener('resize', fit); fit();
reset();
setTimeout(() => run(0), 600);
</script>
</body>
</html>
