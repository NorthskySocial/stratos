services:
  stratos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratos
    restart: unless-stopped
    ports:
      - '${STRATOS_PORT:-3100}:3100'
    environment:
      # Service identity (required)
      STRATOS_SERVICE_DID: ${STRATOS_SERVICE_DID}
      STRATOS_PUBLIC_URL: ${STRATOS_PUBLIC_URL}
      STRATOS_PORT: 3100

      # Service fragment for DID document
      STRATOS_SERVICE_FRAGMENT: ${STRATOS_SERVICE_FRAGMENT:-atproto_pns}

      # Storage backend: "sqlite" (default) or "postgres"
      # To use postgres, change to "postgres" and either set STRATOS_POSTGRES_URL
      # or the individual STRATOS_PG_* vars below, then uncomment the postgres service.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-sqlite}
      # STRATOS_POSTGRES_URL: postgres://stratos:stratos@postgres:5432/stratos
      # Or use individual connection params (e.g. from AWS Secrets Manager):
      # STRATOS_PG_HOST: postgres
      # STRATOS_PG_PORT: 5432
      # STRATOS_PG_USERNAME: stratos
      # STRATOS_PG_PASSWORD: stratos
      # STRATOS_PG_DBNAME: stratos

      # Storage
      STRATOS_DATA_DIR: /app/data
      STRATOS_BLOB_STORAGE: ${STRATOS_BLOB_STORAGE:-local}

      # Stratos namespace config (required)
      STRATOS_ALLOWED_DOMAINS: ${STRATOS_ALLOWED_DOMAINS}
      STRATOS_RETENTION_DAYS: ${STRATOS_RETENTION_DAYS:-30}

      # Enrollment
      STRATOS_ENROLLMENT_MODE: ${STRATOS_ENROLLMENT_MODE:-allowlist}
      STRATOS_ALLOWED_DIDS: ${STRATOS_ALLOWED_DIDS:-}
      STRATOS_ALLOWED_PDS_ENDPOINTS: ${STRATOS_ALLOWED_PDS_ENDPOINTS:-}

      # Identity
      STRATOS_PLC_URL: ${STRATOS_PLC_URL:-https://plc.directory}

      # Signing key (optional - generated if not provided)
      STRATOS_SIGNING_KEY_HEX: ${STRATOS_SIGNING_KEY_HEX:-}

      # OAuth (optional)
      STRATOS_OAUTH_CLIENT_ID: ${STRATOS_OAUTH_CLIENT_ID:-}
      STRATOS_OAUTH_CLIENT_SECRET: ${STRATOS_OAUTH_CLIENT_SECRET:-}

      # OAuth consent screen branding (all optional)
      # Set STRATOS_OAUTH_LOGO_URI to ${STRATOS_PUBLIC_URL}/assets/<file> to self-host the logo
      STRATOS_OAUTH_CLIENT_NAME: ${STRATOS_OAUTH_CLIENT_NAME:-}
      STRATOS_OAUTH_LOGO_URI: ${STRATOS_OAUTH_LOGO_URI:-}
      STRATOS_OAUTH_TOS_URI: ${STRATOS_OAUTH_TOS_URI:-}
      STRATOS_OAUTH_POLICY_URI: ${STRATOS_OAUTH_POLICY_URI:-}

      # User agent (optional)
      STRATOS_REPO_URL: ${STRATOS_REPO_URL:-https://github.com/NorthskySocial/stratos}
      STRATOS_OPERATOR_CONTACT: ${STRATOS_OPERATOR_CONTACT:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Dev mode: allows Bearer DID auth without DPoP (for test scripts)
      STRATOS_DEV_MODE: ${STRATOS_DEV_MODE:-false}
    volumes:
      - stratos-data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3100/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Uncomment to use PostgreSQL instead of SQLite.
  # Also set STORAGE_BACKEND=postgres and configure STRATOS_POSTGRES_URL
  # or STRATOS_PG_* vars above.
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: stratos
  #     POSTGRES_PASSWORD: stratos
  #     POSTGRES_DB: stratos
  #   ports:
  #     - '5432:5432'
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ['CMD-SHELL', 'pg_isready -U stratos']
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # Uncomment to use with S3-compatible storage (e.g., MinIO)
  # minio:
  #   image: minio/minio:latest
  #   container_name: stratos-minio
  #   command: server /data --console-address ":9001"
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio-data:/data
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

volumes:
  stratos-data:
