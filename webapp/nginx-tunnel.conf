server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # OAuth client metadata — dynamically generated from the request Host header
    # so it works with any TryCloudflare URL without knowing it at build time
    location = /client-metadata.json {
        default_type application/json;
        add_header Cache-Control "no-cache";
        return 200 '{"client_id":"https://$host/client-metadata.json","client_name":"Stratos","client_uri":"https://$host","redirect_uris":["https://$host/"],"scope":"atproto transition:generic","grant_types":["authorization_code","refresh_token"],"response_types":["code"],"token_endpoint_auth_method":"none","application_type":"web","dpop_bound_access_tokens":true}';
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
