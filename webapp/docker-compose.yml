# Webapp with Cloudflare Tunnel for HTTPS (required by ATProto OAuth).
# Uses TryCloudflare quick tunnels — no account or token needed.
# The startup script extracts the tunnel URL and prints it.
#
# Quick start:
#   ./start.sh                  # starts stack, prints tunnel URL
#   ./start.sh --build          # rebuilds webapp image first
#
# The webapp serves client-metadata.json dynamically from the Host header,
# so any TryCloudflare URL works without being known at build time.

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
      args:
        VITE_STRATOS_URL: ${VITE_STRATOS_URL}
    container_name: stratos-webapp
    volumes:
      - ./nginx-tunnel.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    restart: unless-stopped

  # Cloudflare Tunnel — provides HTTPS public URL required by ATProto OAuth.
  # The startup script (start.sh) extracts the tunnel URL from cloudflared logs.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stratos-webapp-tunnel
    command: tunnel --no-autoupdate --url http://webapp:80
    depends_on:
      - webapp
    restart: unless-stopped
