services:
  nginx:
    image: nginx:alpine
    container_name: stratos-nginx
    restart: 'no'
    ports:
      - '8443:443'
    volumes:
      - ./test/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      stratos:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://127.0.0.1/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 5s

  ssl-init:
    image: alpine:latest
    container_name: stratos-ssl-init
    volumes:
      - ssl-certs:/ssl
    command:
      - sh
      - -c
      - |
        if [ ! -f /ssl/cert.pem ]; then
          apk add --no-cache openssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /ssl/key.pem -out /ssl/cert.pem \
            -subj '/CN=localhost/O=Stratos/C=US' \
            -addext 'basicConstraints=CA:FALSE' \
            -addext 'keyUsage=digitalSignature,keyEncipherment' \
            -addext 'extendedKeyUsage=serverAuth' \
            -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1'
          chmod 644 /ssl/*.pem
        fi

  stratos:
    user: 1000:1000
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratos-test
    restart: 'no'
    ports:
      - '3100:3100'
    env_file:
      - .env.test
    environment:
      STRATOS_PORT: 3100
      STRATOS_DATA_DIR: /app/data
      STRATOS_BLOB_STORAGE: local
      STRATOS_PUBLIC_URL: ${STRATOS_PUBLIC_URL}
      STRATOS_SERVICE_DID: ${STRATOS_SERVICE_DID}
      STRATOS_OAUTH_CLIENT_ID: ${STRATOS_OAUTH_CLIENT_ID}
      STRATOS_OAUTH_CLIENT_URI: ${STRATOS_OAUTH_CLIENT_URI}
      STRATOS_OAUTH_REDIRECT_URI: ${STRATOS_OAUTH_REDIRECT_URI}
    volumes:
      - ./test-data:/app/data
#    healthcheck:
#      test:
#        [
#          'CMD',
#          'wget',
#          '--no-verbose',
#          '--tries=1',
#          '--spider',
#          'http://localhost:3100/health',
#        ]
#      interval: 10s
#      timeout: 5s
#      retries: 5
#      start_period: 10s

volumes:
  ssl-certs:
