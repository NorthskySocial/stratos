name: Deploy to AWS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install infra dependencies
        working-directory: infra
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: eu-central-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run deploy
        working-directory: infra
        env:
          STRATOS_ENVIRONMENT: staging
          STRATOS_DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          STRATOS_SUBDOMAIN: stratos
          STRATOS_WEBAPP_SUBDOMAIN: app
          STRATOS_SERVICE_DID: ${{ vars.SERVICE_DID }}
          STRATOS_PUBLIC_URL: https://stratos.${{ vars.STRATOS_PUBLIC_URL }}
          STRATOS_ALLOWED_DOMAINS: ${{ vars.DOMAIN_NAME }}
          STRATOS_ENROLLMENT_MODE: open
          STRATOS_WEBAPP_STRATOS_URL: https://app.${{ vars.STRATOS_PUBLIC_URL }}
        run: bash deploy.sh "${{ github.sha }}"
